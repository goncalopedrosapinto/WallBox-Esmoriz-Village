<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallbox — Esmoriz Village</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 480px; padding: 1rem; }

    .card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo .icon { font-size: 2.5rem; }
    .logo h1 { font-size: 1.25rem; font-weight: 600; color: #1a202c; margin-top: 0.5rem; }
    .logo p { font-size: 0.85rem; color: #718096; margin-top: 0.25rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: #4a5568; margin-bottom: 0.4rem; }
    input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #4299e1; }
    .btn { width: 100%; background: #2b6cb0; color: white; border: none; border-radius: 8px; padding: 0.75rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #2c5282; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.85rem; margin-top: 0.75rem; display: none; }

    #dashboard { display: none; }
    .dash-container { max-width: 560px; margin: 0 auto; padding: 1rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-left h2 { font-size: 1.1rem; font-weight: 600; color: #1a202c; }
    .header-left p { font-size: 0.8rem; color: #718096; margin-top: 0.1rem; }
    .logout { background: none; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0.4rem 0.85rem; font-size: 0.8rem; color: #4a5568; cursor: pointer; }
    .logout:hover { background: #f7fafc; }

    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .metric { background: white; border-radius: 12px; padding: 1rem; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .metric-label { font-size: 0.7rem; color: #718096; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-size: 1.5rem; font-weight: 600; color: #1a202c; }

    .section { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 1rem; }
    .section-header { padding: 0.85rem 1.1rem; border-bottom: 1px solid #f0f4f8; display: flex; align-items: center; justify-content: space-between; }
    .section-header h3 { font-size: 0.875rem; font-weight: 600; color: #2d3748; }
    .section-header span { font-size: 0.75rem; color: #a0aec0; }

    .reading-row { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.1rem; border-bottom: 1px solid #f7fafc; }
    .reading-row:last-child { border-bottom: none; }
    .reading-month { font-size: 0.875rem; font-weight: 500; color: #2d3748; }
    .reading-detail { font-size: 0.75rem; color: #a0aec0; margin-top: 0.15rem; }
    .reading-right { text-align: right; }
    .reading-kwh { font-size: 0.875rem; font-weight: 600; color: #2d3748; }
    .reading-eur { font-size: 0.75rem; color: #48bb78; font-weight: 500; margin-top: 0.15rem; }
    .reading-total { font-size: 0.75rem; color: #718096; margin-top: 0.1rem; }

    .empty { padding: 2rem; text-align: center; color: #a0aec0; font-size: 0.875rem; }
    .loading { text-align: center; padding: 2rem; color: #718096; font-size: 0.875rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e2e8f0; border-top-color: #4299e1; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; font-size: 0.75rem; color: #cbd5e0; margin-top: 1.5rem; }
  </style>
</head>
<body>

<div class="container" id="login">
  <div class="card">
    <div class="logo">
      <div class="icon">⚡</div>
      <h1 id="condo-name">Wallbox</h1>
      <p>Consulta os teus consumos</p>
    </div>
    <div class="form-group">
      <label>O teu PIN</label>
      <input type="password" id="pin-input" placeholder="Introduz o teu PIN" maxlength="10" autocomplete="off">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="error" id="login-error">PIN incorreto. Tenta novamente.</div>
    <div id="login-loading" style="display:none; text-align:center; margin-top:1rem; font-size:0.85rem; color:#718096;">
      <span class="spinner"></span> A verificar...
    </div>
  </div>
  <div class="footer">Esmoriz Village · Gestão de Wallbox</div>
</div>

<div id="dashboard">
  <div class="dash-container">
    <div class="header">
      <div class="header-left">
        <h2 id="dash-nome">—</h2>
        <p id="dash-fracao">—</p>
      </div>
      <button class="logout" onclick="doLogout()">Sair</button>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Registos</div>
        <div class="metric-value" id="m-registos">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total kWh</div>
        <div class="metric-value" id="m-kwh">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total €</div>
        <div class="metric-value" id="m-eur">—</div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">
        <h3>Histórico de consumos</h3>
        <span id="preco-label"></span>
      </div>
      <div id="readings-list"><div class="loading"><span class="spinner"></span> A carregar...</div></div>
    </div>
    <div class="footer">Dados atualizados a partir do Google Sheets</div>
  </div>
</div>

<script>
const SHEET_ID = '1eEsGTGWiKsxw5-FZokxTNtJ14KDiyZKGAbfw0OWyjSM';
const API = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

let moradores = [], leituras = [], config = {}, currentUser = null;

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function fetchSheet(sheetName) {
  const res = await fetch(API + encodeURIComponent(sheetName));
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => c.label);
  return rows
    .map(r => { const o = {}; cols.forEach((c,i) => { o[c] = r.c[i]?.v ?? ''; }); return o; })
    .filter(r => Object.values(r).some(v => v !== ''));
}

async function loadData() {
  const [m, l, c] = await Promise.all([
    fetchSheet('Moradores'),
    fetchSheet('Leituras'),
    fetchSheet('Config')
  ]);
  moradores = m;
  leituras = l.filter(r => r['ID_Morador'] !== '');
  config = {};
  c.forEach(row => { config[row['Parâmetro']] = row['Valor']; });
  const nome = config['Nome Condomínio'] || config['Nome do Condomínio'] || 'Esmoriz Village';
  document.getElementById('condo-name').textContent = nome;
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;

  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-loading').style.display = 'block';
  document.getElementById('login-error').style.display = 'none';

  if (!moradores.length) await loadData();

  const pinHash = await sha256(pin);
  const user = moradores.find(m => String(m['PIN']).toLowerCase().trim() === pinHash);

  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-loading').style.display = 'none';

  if (!user) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pin-input').value = '';
    return;
  }

  currentUser = user;
  showDashboard();
}

function showDashboard() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('dash-nome').textContent = currentUser['Nome'] || currentUser['NOME'] || '';
  document.getElementById('dash-fracao').textContent = 'Fração ' + (currentUser['Fração'] || currentUser['FRAÇÃO'] || '');
  renderReadings();
}

function renderReadings() {
  const userId = String(currentUser['ID']);
  const preco = parseFloat(String(config['Preço kWh (€)'] || '0.18').replace(',', '.'));
  const custoFixo = parseFloat(String(config['Custo Fixo Mensal (€)'] || '0').replace(',', '.'));
  const nMoradores = moradores.length || 1;
  const fixoPorMorador = custoFixo / nMoradores;

  document.getElementById('preco-label').textContent = preco.toFixed(2).replace('.', ',') + ' €/kWh';

  const minhas = leituras.filter(l => String(l['ID_Morador']) === userId);

  if (!minhas.length) {
    document.getElementById('readings-list').innerHTML = '<div class="empty">Sem registos ainda.</div>';
    document.getElementById('m-registos').textContent = '0';
    document.getElementById('m-kwh').textContent = '0';
    document.getElementById('m-eur').textContent = '0€';
    return;
  }

  let totalKwh = 0, totalEur = 0;

  const rows = minhas.map(l => {
    const consumo = parseFloat(String(l['Consumo (kWh)'] || '0').replace(',', '.'));
    const custoKwh = consumo * preco;
    const total = custoKwh + fixoPorMorador;
    totalKwh += consumo;
    totalEur += total;
    return `<div class="reading-row">
      <div>
        <div class="reading-month">${l['Mês'] || '—'}</div>
        <div class="reading-detail">${l['Leitura Inicial (kWh)'] || '—'} → ${l['Leitura Final (kWh)'] || '—'} kWh</div>
      </div>
      <div class="reading-right">
        <div class="reading-kwh">${consumo.toFixed(1)} kWh</div>
        <div class="reading-eur">${total.toFixed(2).replace('.', ',')} €</div>
        <div class="reading-total">carga ${custoKwh.toFixed(2).replace('.', ',')} + fixo ${fixoPorMorador.toFixed(2).replace('.', ',')} €</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('readings-list').innerHTML = rows;
  document.getElementById('m-registos').textContent = minhas.length;
  document.getElementById('m-kwh').textContent = totalKwh.toFixed(1).replace('.', ',');
  document.getElementById('m-eur').textContent = totalEur.toFixed(2).replace('.', ',') + '€';
}

function doLogout() {
  currentUser = null;
  document.getElementById('login').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
loadData();
</script>
</body>
</html>
