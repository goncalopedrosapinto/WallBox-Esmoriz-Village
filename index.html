<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wallbox — Esmoriz Village</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e2a4a; min-height: 100vh; color: #1a202c; }

    /* LOGIN */
    #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .login-card { background: white; border-radius: 24px; padding: 2rem 1.75rem; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .bolt { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .login-logo h1 { font-size: 1.3rem; font-weight: 700; color: #1e2a4a; }
    .login-logo p { font-size: 0.8rem; color: #a0aec0; margin-top: 0.25rem; }
    .form-label { font-size: 0.75rem; font-weight: 600; color: #4a5568; margin-bottom: 0.4rem; display: block; letter-spacing: 0.05em; text-transform: uppercase; }
    .form-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 0.85rem 1rem; font-size: 1rem; outline: none; transition: border-color 0.2s; background: #f7fafc; margin-bottom: 1rem; }
    .form-input:focus { border-color: #4a6fa5; background: white; }
    .login-btn { width: 100%; background: #1e2a4a; color: white; border: none; border-radius: 12px; padding: 0.9rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: #2d3f6b; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; border-radius: 10px; padding: 0.65rem 0.85rem; font-size: 0.82rem; margin-top: 0.75rem; display: none; text-align: center; }
    .login-loading { text-align: center; margin-top: 1rem; font-size: 0.82rem; color: #a0aec0; display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #4a6fa5; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.4rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DASHBOARD */
    #dashboard { display: none; min-height: 100vh; background: #1e2a4a; }

    .dash-header { background: #1e2a4a; padding: 3rem 1.25rem 1.5rem; }
    .dash-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem; }
    .dash-header-top h2 { font-size: 1.3rem; font-weight: 700; color: white; }
    .logout-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 20px; padding: 0.4rem 0.85rem; font-size: 0.75rem; color: rgba(255,255,255,0.7); cursor: pointer; }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }
    .dash-header p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

    .dash-body { background: #f0f4f8; border-radius: 24px 24px 0 0; min-height: calc(100vh - 130px); padding: 1.25rem; }

    /* CARDS */
    .card { background: white; border-radius: 16px; margin-bottom: 1rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.1rem 0.75rem; }
    .card-title { font-size: 0.875rem; font-weight: 600; color: #2d3748; }
    .card-badge { font-size: 0.7rem; color: #a0aec0; background: #f7fafc; border-radius: 20px; padding: 0.2rem 0.6rem; }
    .card-divider { height: 1px; background: #f0f4f8; margin: 0 1.1rem; }

    /* MÉTRICAS */
    .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .metric-card { background: white; border-radius: 16px; padding: 1rem 0.75rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .metric-icon { font-size: 1.25rem; margin-bottom: 0.3rem; }
    .metric-val { font-size: 1.3rem; font-weight: 700; color: #1e2a4a; line-height: 1; }
    .metric-lbl { font-size: 0.65rem; color: #a0aec0; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.04em; }

    /* LEITURA */
    .reading-item { padding: 1rem 1.1rem; }
    .reading-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .reading-mes { font-size: 0.95rem; font-weight: 600; color: #2d3748; }
    .reading-kwh-badge { background: #ebf8ff; color: #2b6cb0; border-radius: 20px; padding: 0.2rem 0.65rem; font-size: 0.75rem; font-weight: 600; }

    .resumo { background: #f7fafc; border-radius: 12px; padding: 0.85rem; margin-bottom: 0.75rem; }
    .resumo-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: #718096; padding: 0.2rem 0; }
    .resumo-row.total { font-weight: 700; color: #1e2a4a; font-size: 0.875rem; border-top: 1px solid #e2e8f0; margin-top: 0.4rem; padding-top: 0.5rem; }
    .resumo-leitura { font-size: 0.72rem; color: #a0aec0; margin-bottom: 0.5rem; }

    .fatura-btn { display: flex; align-items: center; gap: 0.5rem; background: #1e2a4a; color: white; border: none; border-radius: 12px; padding: 0.75rem 1rem; font-size: 0.82rem; font-weight: 500; cursor: pointer; text-decoration: none; width: 100%; justify-content: center; }
    .fatura-btn:hover { background: #2d3f6b; }
    .fatura-btn .pdf-icon { font-size: 1rem; }

    .empty { padding: 2.5rem 1rem; text-align: center; color: #a0aec0; font-size: 0.875rem; }
    .dash-footer { text-align: center; font-size: 0.7rem; color: #a0aec0; padding: 1rem 0 2rem; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">
      <span class="bolt">⚡</span>
      <h1 id="condo-name">Esmoriz Village</h1>
      <p>Gestão de Wallbox</p>
    </div>
    <label class="form-label">PIN de acesso</label>
    <input type="password" class="form-input" id="pin-input" placeholder="••••" maxlength="10" autocomplete="off">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">PIN incorreto. Tenta novamente.</div>
    <div class="login-loading" id="login-loading"><span class="spinner"></span>A verificar...</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-header-top">
      <h2 id="dash-nome">—</h2>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
    <p id="dash-fracao">—</p>
  </div>

  <div class="dash-body">
    <!-- Métricas -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-icon">📋</div>
        <div class="metric-val" id="m-registos">—</div>
        <div class="metric-lbl">Registos</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">⚡</div>
        <div class="metric-val" id="m-kwh">—</div>
        <div class="metric-lbl">Total kWh</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">💶</div>
        <div class="metric-val" id="m-eur">—</div>
        <div class="metric-lbl">Total €</div>
      </div>
    </div>

    <!-- Histórico -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Histórico de consumos</span>
        <span class="card-badge" id="preco-label"></span>
      </div>
      <div class="card-divider"></div>
      <div id="readings-list"><div class="empty"><span class="spinner"></span> A carregar...</div></div>
    </div>

    <div class="dash-footer">Dados sincronizados com Google Sheets</div>
  </div>
</div>

<script>
const SHEET_ID = '1eEsGTGWiKsxw5-FZokxTNtJ14KDiyZKGAbfw0OWyjSM';
const API = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

let moradores = [], leituras = [], faturas = [], config = {}, currentUser = null;

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function fetchSheet(name) {
  const res = await fetch(API + encodeURIComponent(name));
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  return (json.table.rows || [])
    .map(r => { const o = {}; cols.forEach((c,i) => { o[c] = r.c[i]?.v ?? ''; }); return o; })
    .filter(r => Object.values(r).some(v => v !== ''));
}

async function loadData() {
  const [m, l, c, f] = await Promise.all([
    fetchSheet('Moradores'), fetchSheet('Leituras'),
    fetchSheet('Config'), fetchSheet('Faturas')
  ]);
  moradores = m;
  leituras = l.filter(r => r['ID_Morador'] !== '');
  faturas = f;
  config = {};
  c.forEach(row => { config[row['Parâmetro']] = row['Valor']; });
  const nome = config['Nome Condomínio'] || 'Esmoriz Village';
  document.getElementById('condo-name').textContent = nome;
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;
  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-loading').style.display = 'block';
  document.getElementById('login-error').style.display = 'none';
  if (!moradores.length) await loadData();
  const pinHash = await sha256(pin);
  const user = moradores.find(m => String(m['PIN']).toLowerCase().trim() === pinHash);
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-loading').style.display = 'none';
  if (!user) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pin-input').value = '';
    return;
  }
  currentUser = user;
  showDashboard();
}

function showDashboard() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('dash-nome').textContent = currentUser['Nome'] || '';
  document.getElementById('dash-fracao').textContent = 'Fração ' + (currentUser['Fração'] || '');
  renderReadings();
}

function convertDriveLink(url) {
  const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/file/d/${match[1]}/view`;
  return url;
}

function renderReadings() {
  const userId = String(currentUser['ID']);
  const preco = parseFloat(String(config['Preço kWh (€)'] || '0.18').replace(',', '.'));
  const custoFixo = parseFloat(String(config['Custo Fixo Mensal (€)'] || '0').replace(',', '.'));
  const nMoradores = moradores.length || 1;
  const fixoPorMorador = parseFloat((custoFixo / nMoradores).toFixed(2));

  document.getElementById('preco-label').textContent = preco.toFixed(2).replace('.', ',') + ' €/kWh';

  const minhas = leituras.filter(l => String(l['ID_Morador']) === userId);

  if (!minhas.length) {
    document.getElementById('readings-list').innerHTML = '<div class="empty">Sem registos ainda.</div>';
    document.getElementById('m-registos').textContent = '0';
    document.getElementById('m-kwh').textContent = '0';
    document.getElementById('m-eur').textContent = '0€';
    return;
  }

  let totalKwh = 0, totalEur = 0;

  const rows = minhas.map(l => {
    const consumo = parseFloat(String(l['Consumo (kWh)'] || '0').replace(',', '.'));
    const custoKwh = parseFloat((consumo * preco).toFixed(2));
    const total = parseFloat((custoKwh + fixoPorMorador).toFixed(2));
    totalKwh += consumo;
    totalEur += total;

    const faturaDoMes = faturas.find(f => String(f['Mês']).trim() === String(l['Mês']).trim());
    const linkFatura = faturaDoMes ? String(faturaDoMes['Link PDF']).trim() : '';

    const faturaHtml = linkFatura
      ? `<a class="fatura-btn" href="${convertDriveLink(linkFatura)}" target="_blank" rel="noopener">
          <span class="pdf-icon">📄</span> Fatura EDP — ${l['Mês']}
        </a>`
      : '';

    return `<div class="reading-item">
      <div class="reading-top">
        <span class="reading-mes">${l['Mês'] || '—'}</span>
        <span class="reading-kwh-badge">${consumo.toFixed(1)} kWh</span>
      </div>
      <div class="resumo-leitura">Leitura: ${l['Leitura Inicial (kWh)'] || l['Leitura Inicial (kwH)'] || '—'} → ${l['Leitura Final (kWh)'] || '—'} kWh</div>
      <div class="resumo">
        <div class="resumo-row"><span>Consumo (${consumo.toFixed(1)} kWh × ${preco.toFixed(3).replace('.', ',')} €)</span><span>${custoKwh.toFixed(2).replace('.', ',')} €</span></div>
        <div class="resumo-row"><span>Custo fixo (${custoFixo.toFixed(2).replace('.', ',')} € ÷ ${nMoradores})</span><span>${fixoPorMorador.toFixed(2).replace('.', ',')} €</span></div>
        <div class="resumo-row total"><span>Total a pagar</span><span>${total.toFixed(2).replace('.', ',')} €</span></div>
      </div>
      ${faturaHtml}
    </div>`;
  }).join('<div style="height:1px;background:#f0f4f8;margin:0 1.1rem"></div>');

  document.getElementById('readings-list').innerHTML = rows;
  document.getElementById('m-registos').textContent = minhas.length;
  document.getElementById('m-kwh').textContent = totalKwh.toFixed(1).replace('.', ',');
  document.getElementById('m-eur').textContent = totalEur.toFixed(2).replace('.', ',') + '€';
}

function doLogout() {
  currentUser = null;
  document.getElementById('login').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
loadData();
</script>
</body>
</html>
